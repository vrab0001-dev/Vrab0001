name: System Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [raid-complete]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Profile Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests anthropic

      - name: Run System Engine
        env:
          RAID_TOKEN: ${{ secrets.RAID_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python system_engine.py

      - name: Commit Changes
        run: |
          git config --local user.email "system@vrab0001.dev"
          git config --local user.name "The System"
          git add README.md system_state.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "⚡ System: Stats Updated" && git push)